services:
  postgres:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: searchly

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations/001_init_table.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres

    env_file:
      - ./.env

  frontend:
    build: ./frontend

    ports:
    - "5173:5173"

    depends_on:
    - backend
      
volumes:
  postgres_data: